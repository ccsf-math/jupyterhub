name: Build and push container image

on:
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout files in repo
      uses: actions/checkout@v4

    - name: Install repo2docker
      run: |
        pip install jupyter-repo2docker==2025.12.0

    - name: Generate Dockerfile with repo2docker
      run: |
        repo2docker --no-run --image-name temp-image .

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Quay
      uses: docker/login-action@v3
      with:
        registry: quay.io
        username: ${{ secrets.QUAY_USERNAME }}
        password: ${{ secrets.QUAY_PASSWORD }}

    - name: Build and push multi-arch image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: Dockerfile   # repo2docker just created this
        platforms: linux/amd64,linux/arm64
        push: true
        tags: quay.io/ccsf/jupyterhub:main
